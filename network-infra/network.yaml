AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template for network infrastructure"

Parameters: 
   Environment:
      Type: String
      Description: "Environment name (e.g., dev, prod)"
    
   VpcCidrBlock:
      Type: String
      Description: "CIDR block for the VPC"

   PublicSubnet1Cidr:
      Type: String
      Description: "CIDR block for the first public subnet"
      
   PublicSubnet2Cidr:
      Type: String
      Description: "CIDR block for the second public subnet"

   PrivateSubnet1Cidr:
      Type: String
      Description: "CIDR block for the first private subnet"

   PrivateSubnet2Cidr:
      Type: String
      Description: "CIDR block for the second private subnet"
      
Resources:
    VPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: !Ref VpcCidrBlock
        EnableDnsSupport: true
        EnableDnsHostnames: true
        Tags:
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-vpc'

    internetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-internet-gateway'
    
    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref VPC
        InternetGatewayId: !Ref internetGateway

    publicSubnet1:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        AvailabilityZone: !Select [ 0, !GetAZs '' ]
        CidrBlock: !Ref PublicSubnet1Cidr
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-public-subnet-1 (AZ1)'

    publicSubnet2:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        AvailabilityZone: !Select [ 1, !GetAZs '' ]
        CidrBlock: !Ref PublicSubnet2Cidr
        MapPublicIpOnLaunch: true
        Tags: 
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-public-subnet-2 (AZ2)'

    privateSubnet1:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        AvailabilityZone: !Select [ 0, !GetAZs '' ]
        CidrBlock: !Ref PrivateSubnet1Cidr
        MapPublicIpOnLaunch: false
        Tags:
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-private-subnet-1 (AZ1)'

    privateSubnet2:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        AvailabilityZone: !Select [ 1, !GetAZs '' ]
        CidrBlock: !Ref PrivateSubnet2Cidr
        MapPublicIpOnLaunch: false
        Tags:
          - Key: Name
            Value:
              Fn::Sub : '${Environment}-private-subnet-2 (AZ2)'

    